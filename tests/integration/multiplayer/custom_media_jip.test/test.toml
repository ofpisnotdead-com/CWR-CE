mission = "tests/integration/missions/jip_basic.Demo"
data_dir = "packages/Demo"
game_port = 0
timeout = 90

tags = ["headful", "network"]

[[instances]]
extra_args = ["--no-strict", "--log-format", "jsonl"]
name = "server"
type = "server"

[[instances]]
extra_args = ["--no-strict", "--name", "client1", "--log-format", "jsonl"]
name = "client1"
type = "client"
connect = "server"
after = "server"
wait_ngs = 13
mp_assign = "WEST:1"
machine_id = "trident:custom_media_jip:client1"
copy_files = [
  { source = "client1/UserInfo.cfg", target = "Users/client1/UserInfo.cfg" },
  { source = "client1/face.jpg", target = "Users/client1/face.jpg" },
  { source = "client1/Sound/tri_mp_ping.wav", target = "Users/client1/Sound/tri_mp_ping.wav" },
]

