extra_args = ["--no-strict", "--name", "client2", "--log-format", "jsonl"]
name = "client2"
type = "client"
connect = "server"
after = "server"
wait_ngs = 13
mp_assign = "WEST:2"
machine_id = "trident:custom_media_jip:client2"
copy_files = [
  { source = "client2/UserInfo.cfg", target = "Users/client2/UserInfo.cfg" },
  { source = "client2/face.jpg", target = "Users/client2/face.jpg" },
  { source = "client2/Sound/tri_mp_ping.wav", target = "Users/client2/Sound/tri_mp_ping.wav" },
]
