data_dir = "packages/Demo"
game_port = 0
timeout = 75

tags = ["headful", "network"]

# Push-to-talk must be repeatable. The speaker opens the PTT HUD, sends a
# synthetic tone, releases the key, then repeats; the listener must receive both
# bursts while both clients are still in the MP lobby.

[[instances]]
extra_args = ["--no-strict", "--log-format", "jsonl", "--config", "${output}/server/user/server.cfg"]
name = "server"
type = "server"
use_mission = false
copy_files = [
  { source = "server.cfg", target = "server.cfg" },
  { source = "jip_basic.Demo.pbo", target = "content/MPMissions/jip_basic.Demo.pbo" },
]

[[instances]]
extra_args = ["--no-strict", "--name", "ptt", "--log-format", "jsonl"]
name = "client"
type = "client"
use_mission = false
connect = "server"
after = "server"
start_delay_ms = 4000
machine_id = "trident:von_push_to_talk:client"

[[instances]]
extra_args = ["--no-strict", "--name", "listener", "--log-format", "jsonl"]
name = "listener"
type = "client"
use_mission = false
connect = "server"
after = "server"
start_delay_ms = 4000
machine_id = "trident:von_push_to_talk:listener"
