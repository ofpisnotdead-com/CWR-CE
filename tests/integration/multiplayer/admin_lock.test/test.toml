mission = "tests/integration/missions/jip_basic.Demo"
data_dir = "packages/Demo"
game_port = 0
timeout = 120
render = "dummy"

tags = ["headful", "network"]

# The server role observes its own #lock / #unlock lifecycle via triServerLocked
# (0 -> 1 -> 0), a direct state observable of the admin lock path. The admin
# drives the commands after logging in.
[[instances]]
extra_args = ["--no-strict", "--log-format", "jsonl", "--config", "${output}/server/user/server.cfg"]
name = "server"
type = "server"
copy_files = [
  { source = "server.cfg", target = "server.cfg" },
]

[[instances]]
extra_args = ["--no-strict", "--name", "admin", "--log-format", "jsonl"]
name = "admin"
type = "client"
connect = "server"
after = "server"
wait_ngs = 13
mp_assign = "WEST:1"
machine_id = "trident:admin_lock:admin"
