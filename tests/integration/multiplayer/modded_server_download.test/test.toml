mission = "tests/integration/missions/mp_browser_basic.Demo"
data_dir = "packages/Demo"
game_port = 0
timeout = 75

tags = ["headful", "ci-host-blocked"]

[[services]]
name = "master"
type = "master-server"
port = 0
db = "${output}/master.sqlite3"
extra_args = ["--mods-dir", "${output}/master-mods"]

[[services.seed_mods]]
id = "fixturemod"
name = "Fixture Mod"
version = "1.2.3"
app = "CWR"
actver = 303
folder = "@fixturemod"
source = "tests/fixtures/mods/@fixturemod"
description = "Tiny downloadable fixture mod for Trident modded-server tests."
authors = ["CWR test fixture"]

[[services]]
name = "probe"
type = "master-probe"
after = "master"
interval_secs = 1
timeout_ms = 500
prune_max_age_secs = 60

[[instances]]
name = "dedicated"
type = "server"
after = "master"
extra_args = [
    "--no-strict",
    "--public",
    "--master-server",
    "${master.url}",
    "--advertise-address",
    "127.0.0.1",
    "--mp-auto-start",
    "1",
    "--mods-dir",
    "../../tests/fixtures/mods",
    "--mod",
    "@fixturemod",
]

[[instances]]
name = "client"
type = "client"
after = "dedicated"
use_mission = false
start_delay_ms = 3000
no_autotest = true
extra_args = [
    "--no-strict",
    "--lang",
    "English",
    "--master-server",
    "${master.url}",
    "--mp-assign",
    "WEST:1",
    "--mods-dir",
    "${output}/client-local-mods",
    "--workshop-dir",
    "${output}/client-workshop",
]

[[instances]]
name = "client2"
type = "client"
after = "dedicated"
use_mission = false
start_delay_ms = 3000
no_autotest = true
extra_args = [
    "--no-strict",
    "--lang",
    "English",
    "--master-server",
    "${master.url}",
    "--mp-assign",
    "WEST:2",
    "--mods-dir",
    "${output}/client2-local-mods",
    "--workshop-dir",
    "${output}/client2-workshop",
]
