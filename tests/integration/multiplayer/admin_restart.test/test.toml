data_dir = "packages/Demo"
game_port = 0
timeout = 120
render = "dummy"

tags = ["headful", "network"]

# Classic dedicated lifecycle: no --simulate. The server takes its mission from
# the config Missions class and cycles lobby -> briefing -> play, so #restart
# reloads the mission instead of ending the simulate-mode session.
[[instances]]
extra_args = ["--no-strict", "--log-format", "jsonl", "--config", "${output}/server/user/server.cfg"]
name = "server"
type = "server"
use_mission = false
copy_files = [
  { source = "server.cfg", target = "server.cfg" },
  { source = "jip_basic.Demo.pbo", target = "content/MPMissions/jip_basic.Demo.pbo" },
]

# Becomes admin via #login and drives two #restart commands through debriefing,
# returning to a playable state for both subsequent mission cycles.
[[instances]]
extra_args = ["--no-strict", "--name", "client1", "--log-format", "jsonl"]
name = "client1"
type = "client"
use_mission = false
connect = "server"
after = "server"
start_delay_ms = 4000
mp_assign = "WEST:1"
machine_id = "trident:admin_restart:client1"
