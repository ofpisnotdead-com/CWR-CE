data_dir = "packages/Game"
game_port = 0
timeout = 300
required_env = ["CWR_MODS_SOURCE_DIR"]
tags = ["headful", "network", "ci-host-blocked", "external-mods", "exclusive"]

[[instances]]
extra_args = [
  "--no-strict",
  "--log-format", "jsonl",
  "--config", "${output}/server/user/server.cfg",
  "--mods-dir", "${env.CWR_MODS_SOURCE_DIR}",
  "--mod", "mfcti-1.16",
]
name = "server"
type = "server"
use_mission = false
copy_files = [
  { source = "server.cfg", target = "server.cfg" },
]

[[instances]]
extra_args = [
  "--no-strict",
  "--name", "mfcti-cold-c1",
  "--log-format", "jsonl",
  "--mods-dir", "${env.CWR_MODS_SOURCE_DIR}",
  "--mod", "mfcti-1.16",
]
name = "client1"
type = "client"
use_mission = false
no_autotest = true
after = "server"
start_delay_ms = 1000

[[instances]]
extra_args = [
  "--no-strict",
  "--name", "mfcti-cold-c2",
  "--log-format", "jsonl",
  "--mods-dir", "${env.CWR_MODS_SOURCE_DIR}",
  "--mod", "mfcti-1.16",
]
name = "client2"
type = "client"
use_mission = false
no_autotest = true
after = "server"
start_delay_ms = 2500
