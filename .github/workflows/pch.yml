name: C++ / PCH

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  no-pch-build:
    name: Linux Debug no-PCH
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build (no PCH, no cache)
        uses: ./.github/actions/build-cwr
        with:
          preset: linux-x64-clang
          vcpkg-triplet: x64-linux-clang
          build-dir: build/linux-x64-clang
          run-tests: 'false'
          use-ccache: 'false'
          use-vcpkg-binary-cache: 'false'
          extra-cmake-args: '-DPOSEIDON_DISABLE_PCH=ON'
