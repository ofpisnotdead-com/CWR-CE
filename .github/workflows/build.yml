name: C++ / Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CCACHE_BASEDIR: ${{ github.workspace }}
  CCACHE_SLOPPINESS: pch_defines,time_macros,include_file_mtime,include_file_ctime
  CCACHE_NOHASHDIR: true
  CMAKE_BUILD_PARALLEL_LEVEL: 2
  CTEST_OUTPUT_ON_FAILURE: 1

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux RelWithDebInfo
            os: ubuntu-24.04
            preset: linux-x64-clang-rwdi
            vcpkg_triplet: x64-linux-clang
            build_dir: build/linux-x64-clang-rwdi
          - name: macOS (Apple Silicon) RelWithDebInfo
            os: [self-hosted, macOS, ARM64]
            preset: macos-arm64-clang-rwdi
            vcpkg_triplet: arm64-osx
            build_dir: build/macos-arm64-clang-rwdi
          - name: Windows RelWithDebInfo
            os: windows-2022
            preset: win-x64-clang-rwdi
            vcpkg_triplet: x64-windows-clang
            build_dir: build/win-x64-clang-rwdi
            ctest_exclude: 'PoseidonTests - (OAL -|PAAEncoder -|Image - Save to \.paa|World state file format --|PreviewImage - saveToFile writes|PreviewImageRGB - saveToFile writes)'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system packages
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            autoconf-archive \
            automake \
            clang \
            libtool \
            pkg-config \
            libgl1-mesa-dev \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libxtst-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libwayland-dev \
            wayland-protocols

      - name: Verify macOS dependencies
        if: runner.os == 'macOS'
        run: |
          command -v brew
          command -v cmake
          command -v ninja
          command -v ccache
          command -v clang
          command -v clang++
          command -v clang-format

      - name: Setup MSVC developer environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup LLVM and Clang
        if: runner.os == 'Windows'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: '19'
          arch: 'x64'
          directory: 'C:\Program Files\LLVM'

      - name: Setup compiler cache
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          variant: ccache
          key: ${{ runner.os }}-${{ matrix.preset }}-pch
          max-size: 1G

      - name: Setup CMake and Ninja
        if: runner.os != 'macOS'
        uses: lukka/get-cmake@latest

      - name: Show toolchain versions
        if: runner.os != 'Windows'
        run: |
          cmake --version
          ninja --version
          ccache --version
          clang --version
          clang++ --version

      - name: Show Windows toolchain versions
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake --version
          ninja --version
          ccache --version
          clang-cl --version
          link.exe /?

      - name: Restore vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: .vcpkg-bincache/${{ matrix.vcpkg_triplet }}
          key: vcpkg-${{ runner.os }}-${{ matrix.vcpkg_triplet }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'cmake/vcpkg-triplets/**', 'cmake/vcpkg-overlay-ports/**') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ matrix.vcpkg_triplet }}-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        env:
          VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/.vcpkg-bincache/${{ matrix.vcpkg_triplet }},readwrite
          VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-bincache/${{ matrix.vcpkg_triplet }}
          VCPKG_DEFAULT_TRIPLET: ${{ matrix.vcpkg_triplet }}
          VCPKG_INSTALLED_DIR: ${{ github.workspace }}/${{ matrix.build_dir }}/vcpkg_installed
          VCPKG_OVERLAY_PORTS: ${{ github.workspace }}/cmake/vcpkg-overlay-ports
          VCPKG_OVERLAY_TRIPLETS: ${{ github.workspace }}/cmake/vcpkg-triplets
        with:
          vcpkgDirectory: ${{ runner.tool_cache }}/vcpkg
          vcpkgGitCommitId: 15cd15b0da3c48a0c7720e4c87e0b6030334feed
          runVcpkgInstall: true
          vcpkgJsonGlob: 'vcpkg.json'

      - name: Configure
        run: >
          cmake
          --preset ${{ matrix.preset }}
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build ${{ matrix.build_dir }}

      - name: Test
        if: runner.os != 'Windows'
        env:
          CTEST_EXCLUDE: ${{ matrix.ctest_exclude }}
        run: |
          if [ -z "${CTEST_EXCLUDE}" ]; then
            ctest --test-dir '${{ matrix.build_dir }}' --output-on-failure
          else
            ctest --test-dir '${{ matrix.build_dir }}' --output-on-failure -E "${CTEST_EXCLUDE}"
          fi

      - name: Test
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          CTEST_EXCLUDE: ${{ matrix.ctest_exclude }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CTEST_EXCLUDE)) {
            ctest --test-dir '${{ matrix.build_dir }}' --output-on-failure
          } else {
            ctest --test-dir '${{ matrix.build_dir }}' --output-on-failure -E "$env:CTEST_EXCLUDE"
          }

      - name: Smoke test macOS renderers
        if: runner.os == 'macOS'
        run: |
          '${{ matrix.build_dir }}/apps/tools/GL33SmokeTest/GL33SmokeTest' --check

      - name: Upload CTest logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-logs-${{ matrix.preset }}
          path: ${{ matrix.build_dir }}/Testing/
          if-no-files-found: ignore
