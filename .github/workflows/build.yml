name: C++ / Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CCACHE_BASEDIR: ${{ github.workspace }}
  CCACHE_SLOPPINESS: pch_defines,time_macros,include_file_mtime,include_file_ctime
  CCACHE_NOHASHDIR: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux RelWithDebInfo
            os: ubuntu-24.04
            preset: linux-x64-clang-rwdi
            vcpkg_triplet: x64-linux-clang
            build_dir: build/linux-x64-clang-rwdi
            ctest_exclude: 'PoseidonTests - OAL -'
            artifact_prefix: 'Linux-x64-rwdi'
            dist_dir: dist/x64-linux-rwdi
            game_artifact_path: dist/x64-linux-rwdi/PoseidonGame
            game_demo_artifact_path: dist/x64-linux-rwdi/PoseidonGameDemo
            server_artifact_path: dist/x64-linux-rwdi/PoseidonServer
          - name: macOS arm64 RelWithDebInfo
            os: macos-26
            preset: darwin-arm64-clang-rwdi
            vcpkg_triplet: arm64-darwin-clang
            build_dir: build/darwin-arm64-clang-rwdi
            ctest_exclude: 'PoseidonTests - OAL -|PoseidonFoundationTests - potime - Platform consistency|PoseidonFoundationTests - potime - Poseidon - Foundation - getSystemTime timing accuracy|PoseidonFoundationTests - potime - SLEEP_MS macro'
            artifact_prefix: 'macOS-arm64-rwdi'
            dist_dir: dist/darwin-arm64-clang-rwdi
            game_artifact_path: dist/darwin-arm64-clang-rwdi/PoseidonGame
            game_demo_artifact_path: dist/darwin-arm64-clang-rwdi/PoseidonGameDemo
            server_artifact_path: dist/darwin-arm64-clang-rwdi/PoseidonServer
          - name: macOS x64 RelWithDebInfo
            os: macos-26
            preset: darwin-x64-clang-rwdi
            vcpkg_triplet: x64-darwin-clang
            build_dir: build/darwin-x64-clang-rwdi
            ctest_exclude: 'PoseidonTests - OAL -|PoseidonFoundationTests - potime - Platform consistency|PoseidonFoundationTests - potime - Poseidon - Foundation - getSystemTime timing accuracy|PoseidonFoundationTests - potime - SLEEP_MS macro'
            artifact_prefix: 'macOS-x64-rwdi'
            dist_dir: dist/darwin-x64-clang-rwdi
            game_artifact_path: dist/darwin-x64-clang-rwdi/PoseidonGame
            game_demo_artifact_path: dist/darwin-x64-clang-rwdi/PoseidonGameDemo
            server_artifact_path: dist/darwin-x64-clang-rwdi/PoseidonServer
          - name: Windows RelWithDebInfo
            os: windows-2022
            preset: win-x64-clang-rwdi
            vcpkg_triplet: x64-windows-clang
            build_dir: build/win-x64-clang-rwdi
            ctest_exclude: 'PoseidonTests - (OAL -|PAAEncoder -|Image - Save to \.paa|World state file format --|PreviewImage - saveToFile writes|PreviewImageRGB - saveToFile writes)'
            artifact_prefix: 'Windows-x64-rwdi'
            dist_dir: dist/x64-win-rwdi
            game_artifact_path: |
              dist/x64-win-rwdi/PoseidonGame.exe
              dist/x64-win-rwdi/OpenAL32.dll
              dist/x64-win-rwdi/OpenAL-Soft.LICENSE.txt
            game_demo_artifact_path: |
              dist/x64-win-rwdi/PoseidonGameDemo.exe
              dist/x64-win-rwdi/OpenAL32.dll
              dist/x64-win-rwdi/OpenAL-Soft.LICENSE.txt
            server_artifact_path: dist/x64-win-rwdi/PoseidonServer.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build metadata
        id: build_metadata
        shell: bash
        run: echo "sha_short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and test
        uses: ./.github/actions/build-cwr
        with:
          preset: ${{ matrix.preset }}
          vcpkg-triplet: ${{ matrix.vcpkg_triplet }}
          build-dir: ${{ matrix.build_dir }}
          ctest-exclude: ${{ matrix.ctest_exclude }}

      - name: Upload Game
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_prefix }}-Game-${{ steps.build_metadata.outputs.sha_short }}
          path: ${{ matrix.game_artifact_path }}
          if-no-files-found: error

      - name: Upload GameDemo
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_prefix }}-GameDemo-${{ steps.build_metadata.outputs.sha_short }}
          path: ${{ matrix.game_demo_artifact_path }}
          if-no-files-found: error

      - name: Upload Server
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_prefix }}-Server-${{ steps.build_metadata.outputs.sha_short }}
          path: ${{ matrix.server_artifact_path }}
          if-no-files-found: error

      - name: Upload symbols
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_prefix }}-Symbols-${{ steps.build_metadata.outputs.sha_short }}
          path: |
            ${{ matrix.dist_dir }}/PoseidonGame.pdb
            ${{ matrix.dist_dir }}/PoseidonGameDemo.pdb
            ${{ matrix.dist_dir }}/PoseidonServer.pdb
          if-no-files-found: error

  steamrt4:
    name: SteamRT4 Release
    runs-on: ubuntu-24.04
    env:
      STEAMRT4_PRESET: linux-x64-steamrt4
      STEAMRT4_VCPKG_TRIPLET: x64-linux-clang
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build SteamRT4 SDK image
        uses: docker/build-push-action@v6
        with:
          context: docker/steamrt4
          load: true
          tags: cwr-steamrt4:latest
          cache-from: type=gha,scope=steamrt4-sdk
          cache-to: type=gha,mode=max,scope=steamrt4-sdk

      - name: Restore SteamRT4 compiler cache
        uses: actions/cache@v4
        with:
          path: tmp/steamrt4-ccache
          key: ccache-SteamRT4-${{ env.STEAMRT4_PRESET }}-${{ github.sha }}
          restore-keys: |
            ccache-SteamRT4-${{ env.STEAMRT4_PRESET }}-

      - name: Restore SteamRT4 vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: .vcpkg-bincache/${{ env.STEAMRT4_VCPKG_TRIPLET }}
          key: vcpkg-SteamRT4-${{ env.STEAMRT4_VCPKG_TRIPLET }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'cmake/vcpkg-triplets/**', 'cmake/vcpkg-overlay-ports/**') }}
          restore-keys: |
            vcpkg-SteamRT4-${{ env.STEAMRT4_VCPKG_TRIPLET }}-

      - name: Build inside SteamRT4 container
        run: |
          set -o pipefail
          mkdir -p \
            "${{ github.workspace }}/tmp/steamrt4-ccache" \
            "${{ github.workspace }}/.vcpkg-bincache/${{ env.STEAMRT4_VCPKG_TRIPLET }}"
          docker run --rm \
            -e OFPR_TARGETS=all \
            -e VCPKG_BINARY_SOURCES="clear;files,/work/ofpr/.vcpkg-bincache/${{ env.STEAMRT4_VCPKG_TRIPLET }},readwrite" \
            -e VCPKG_DEFAULT_BINARY_CACHE="/work/ofpr/.vcpkg-bincache/${{ env.STEAMRT4_VCPKG_TRIPLET }}" \
            -e VCPKG_DEFAULT_TRIPLET="${{ env.STEAMRT4_VCPKG_TRIPLET }}" \
            -v "${{ github.workspace }}:/work/ofpr" \
            cwr-steamrt4:latest 2>&1 | tee steamrt4-build.log

      - name: Upload SteamRT4 build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: steamrt4-build-log
          path: steamrt4-build.log
