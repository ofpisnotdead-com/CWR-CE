name: C++ / Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CCACHE_BASEDIR: ${{ github.workspace }}
  CCACHE_SLOPPINESS: pch_defines,time_macros,include_file_mtime,include_file_ctime
  CCACHE_NOHASHDIR: true
  CMAKE_BUILD_PARALLEL_LEVEL: 2
  CTEST_OUTPUT_ON_FAILURE: 1

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    concurrency:
      group: ${{ contains(matrix.os, 'macOS') && 'cwr-arm64-self-hosted-macos' || format('cwr-arm64-{0}-{1}', github.run_id, matrix.name) }}
      cancel-in-progress: false

    strategy:
      fail-fast: false
      matrix:
        include:
          # [external-data] tests under PoseidonTests read real localization
          # assets (equipment.utf8.html, STRINGTABLE_MAP.utf8.csv,
          # STRINGTABLE_EQUIPMENT.utf8.csv) from packages/Combined/, which is
          # gitignored and not distributed to the GitHub-hosted runners by
          # design. The self-hosted macOS runner has the real data staged
          # outside the checkout path (see "Stage Combined test data" below)
          # and runs these for real; Linux/Windows exclude them by name.
          - name: Linux RelWithDebInfo
            os: [self-hosted, debian-13, x64]
            preset: linux-x64-clang-rwdi
            vcpkg_triplet: x64-linux-clang
            build_dir: build/linux-x64-clang-rwdi
            build_target: ''
            ctest_exclude: 'PoseidonTests - (STRINGTABLE_MAP\.utf8\.csv ships both legend keys with English fallbacks|STRINGTABLE_EQUIPMENT\.utf8\.csv ships M16 keys for all 8 languages|equipment\.utf8\.html lives loose and references STR_EQ_M16 tokens|equipment\.utf8\.html line endings are clean CRLF \(no doubled CR\)|equipment\.utf8\.html preserves every EQ_ anchor and weapon image)'
          - name: macOS (Apple Silicon) RelWithDebInfo
            os: [self-hosted, macOS, arm64]
            preset: macos-arm64-clang-rwdi
            vcpkg_triplet: arm64-osx
            build_dir: build/macos-arm64-clang-rwdi
            build_target: ''
          - name: iOS Device Debug
            os: [self-hosted, macOS, arm64]
            preset: ios-arm64-device
            vcpkg_triplet: arm64-ios
            build_dir: build/ios-arm64-device
            build_target: PoseidonGame
            xcode: true
            skip_tests: true
          - name: Windows RelWithDebInfo
            os: windows-2022
            preset: win-x64-clang-rwdi
            vcpkg_triplet: x64-windows-clang
            build_dir: build/win-x64-clang-rwdi
            build_target: ''
            ctest_exclude: 'PoseidonTests - (OAL -|PAAEncoder -|Image - Save to \.paa|World state file format --|PreviewImage - saveToFile writes|PreviewImageRGB - saveToFile writes|STRINGTABLE_MAP\.utf8\.csv ships both legend keys with English fallbacks|STRINGTABLE_EQUIPMENT\.utf8\.csv ships M16 keys for all 8 languages|equipment\.utf8\.html lives loose and references STR_EQ_M16 tokens|equipment\.utf8\.html line endings are clean CRLF \(no doubled CR\)|equipment\.utf8\.html preserves every EQ_ anchor and weapon image)'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # packages/ is gitignored and actions/checkout's clean:true wipes it
      # (git clean -ffdx removes ignored files too) at the start of every
      # run, so the real data lives outside the checkout at
      # /Users/jarvis/ci-data/Combined and gets relinked in here each time.
      - name: Stage Combined test data
        if: runner.os == 'macOS'
        run: |
          mkdir -p packages
          ln -sfn /Users/jarvis/ci-data/Combined packages/Combined

      - name: Install Linux system packages
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            autoconf-archive \
            automake \
            ca-certificates \
            clang \
            clang-format \
            curl \
            libtool \
            make \
            perl \
            pkg-config \
            tar \
            zip \
            libgl1-mesa-dev \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libxtst-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libopenal-dev \
            wayland-protocols \
            ccache \
            unzip

      - name: Verify macOS dependencies
        if: runner.os == 'macOS'
        run: |
          command -v brew
          command -v cmake
          command -v ninja
          command -v ccache
          command -v clang
          command -v clang++
          command -v clang-format
          command -v pkg-config
          command -v xcodebuild

      - name: Setup MSVC developer environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup LLVM and Clang
        if: runner.os == 'Windows'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: '19'
          arch: 'x64'
          directory: 'C:\Program Files\LLVM'

      - name: Configure self-hosted compiler cache
        if: runner.environment == 'self-hosted' && runner.os != 'Windows'
        run: |
          export CCACHE_DIR="$HOME/.cache/ccache/${{ matrix.preset }}"
          mkdir -p "$CCACHE_DIR"
          if [ "${{ runner.os }}" = "macOS" ]; then
            current_clang="$(xcrun clang --version | head -n 1)"
            clang_stamp="$CCACHE_DIR/.xcode-clang-version"
            echo "CCACHE_COMPILERCHECK=string:$current_clang" >> "$GITHUB_ENV"
            if [ ! -f "$clang_stamp" ] || [ "$(cat "$clang_stamp")" != "$current_clang" ]; then
              echo "Xcode/clang changed; clearing ccache for ${{ matrix.preset }}"
              ccache --clear
              printf '%s\n' "$current_clang" > "$clang_stamp"
            fi
          fi
          ccache --set-config=max_size=1G
          ccache --zero-stats
          echo "CCACHE_DIR=$CCACHE_DIR" >> "$GITHUB_ENV"

      - name: Setup CMake and Ninja
        if: runner.os != 'macOS'
        uses: lukka/get-cmake@latest

      - name: Show toolchain versions
        if: runner.os != 'Windows'
        run: |
          cmake --version
          ninja --version
          ccache --version
          clang --version
          clang++ --version
          if [ "${{ runner.os }}" = "Linux" ]; then
            pkg-config --modversion openal
            /sbin/ldconfig -p | grep -E 'libopenal\.so(\.1)?'
          fi

      - name: Clear macOS precompiled headers
        if: runner.environment == 'self-hosted' && runner.os == 'macOS'
        run: |
          xcrun clang --version | head -n 1
          build_dirs=(
            "${{ matrix.build_dir }}"
            "build/macos-arm64-clang-rwdi"
            "build/ios-arm64-device"
          )

          for build_dir in "${build_dirs[@]}"; do
            echo "Clearing CMake precompiled headers in $build_dir"
            find "$build_dir" -name '*.pch' -delete 2>/dev/null || true
          done

      - name: Show Windows toolchain versions
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake --version
          ninja --version
          clang-cl --version
          Get-Command link.exe

      - name: Configure self-hosted vcpkg binary cache
        if: runner.environment == 'self-hosted'
        run: |
          mkdir -p "$HOME/.cache/vcpkg-bincache/${{ matrix.vcpkg_triplet }}"
          mkdir -p .vcpkg-bincache
          rm -rf ".vcpkg-bincache/${{ matrix.vcpkg_triplet }}"
          ln -s "$HOME/.cache/vcpkg-bincache/${{ matrix.vcpkg_triplet }}" ".vcpkg-bincache/${{ matrix.vcpkg_triplet }}"

      - name: Restore vcpkg binary cache
        if: runner.environment != 'self-hosted'
        uses: actions/cache@v4
        with:
          path: .vcpkg-bincache/${{ matrix.vcpkg_triplet }}
          key: vcpkg-${{ runner.os }}-${{ matrix.vcpkg_triplet }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'cmake/vcpkg-triplets/**', 'cmake/vcpkg-overlay-ports/**') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ matrix.vcpkg_triplet }}-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        env:
          VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/.vcpkg-bincache/${{ matrix.vcpkg_triplet }},readwrite
          VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-bincache/${{ matrix.vcpkg_triplet }}
          VCPKG_DEFAULT_TRIPLET: ${{ matrix.vcpkg_triplet }}
          VCPKG_INSTALLED_DIR: ${{ github.workspace }}/${{ matrix.build_dir }}/vcpkg_installed
          VCPKG_OVERLAY_PORTS: ${{ github.workspace }}/cmake/vcpkg-overlay-ports
          VCPKG_OVERLAY_TRIPLETS: ${{ github.workspace }}/cmake/vcpkg-triplets
        with:
          vcpkgDirectory: ${{ runner.tool_cache }}/vcpkg
          vcpkgGitCommitId: 15cd15b0da3c48a0c7720e4c87e0b6030334feed
          runVcpkgInstall: true
          vcpkgJsonGlob: 'vcpkg.json'

      - name: Configure
        if: matrix.xcode != true && runner.environment == 'self-hosted'
        run: >
          cmake
          --preset ${{ matrix.preset }}
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Configure
        if: matrix.xcode != true && runner.environment != 'self-hosted'
        run: >
          cmake
          --preset ${{ matrix.preset }}
          -DCMAKE_C_COMPILER_LAUNCHER=
          -DCMAKE_CXX_COMPILER_LAUNCHER=

      - name: Configure Xcode
        if: matrix.xcode == true
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        if: matrix.build_target == ''
        run: cmake --build ${{ matrix.build_dir }}

      - name: Build target
        if: matrix.build_target != '' && matrix.xcode != true
        run: cmake --build ${{ matrix.build_dir }} --target ${{ matrix.build_target }}

      - name: Build Xcode target
        if: matrix.build_target != '' && matrix.xcode == true
        run: >
          cmake --build ${{ matrix.build_dir }}
          --target ${{ matrix.build_target }}
          --
          -quiet
          CODE_SIGNING_ALLOWED=NO
          CODE_SIGNING_REQUIRED=NO

      - name: Test
        if: runner.os != 'Windows' && matrix.skip_tests != true
        env:
          CTEST_EXCLUDE: ${{ matrix.ctest_exclude }}
          ALSOFT_DRIVERS: ${{ runner.os == 'Linux' && 'null' || '' }}
        run: |
          if [ -z "${CTEST_EXCLUDE}" ]; then
            ctest --test-dir '${{ matrix.build_dir }}' --output-on-failure
          else
            ctest --test-dir '${{ matrix.build_dir }}' --output-on-failure -E "${CTEST_EXCLUDE}"
          fi

      - name: Test
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          CTEST_EXCLUDE: ${{ matrix.ctest_exclude }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CTEST_EXCLUDE)) {
            ctest --test-dir '${{ matrix.build_dir }}' --output-on-failure
          } else {
            ctest --test-dir '${{ matrix.build_dir }}' --output-on-failure -E "$env:CTEST_EXCLUDE"
          }

      - name: Show compiler cache stats
        if: always() && runner.environment == 'self-hosted' && runner.os != 'Windows'
        run: ccache --show-stats

      - name: Smoke test macOS renderers
        if: runner.os == 'macOS' && matrix.skip_tests != true
        run: |
          '${{ matrix.build_dir }}/apps/tools/GL33SmokeTest/GL33SmokeTest' --check
          '${{ matrix.build_dir }}/apps/tools/MetalSmokeTest/MetalSmokeTest' --check

      - name: Upload CTest logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-logs-${{ matrix.preset }}
          path: ${{ matrix.build_dir }}/Testing/
          if-no-files-found: ignore
