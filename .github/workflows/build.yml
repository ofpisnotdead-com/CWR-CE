name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CCACHE_BASEDIR: ${{ github.workspace }}
  CCACHE_SLOPPINESS: pch_defines,time_macros,include_file_mtime,include_file_ctime
  CCACHE_NOHASHDIR: true
  CMAKE_BUILD_PARALLEL_LEVEL: 2
  CTEST_OUTPUT_ON_FAILURE: 1

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    # The self-hosted-macOS-labeled matrix entries (macOS + iOS Device) share a
    # single physical self-hosted runner, so they need to queue behind each
    # other -- but the group must vary per *workflow run* (github.run_id), not
    # be a single global literal, or a newer run's queued job cancels an older
    # run's still-queued job from an entirely unrelated PR/branch/push (only
    # one pending job per concurrency group is ever kept, even with
    # cancel-in-progress: false -- that only protects an already-*running*
    # job, not one still waiting for the runner). Checking for 'self-hosted'
    # in addition to 'macOS' keeps the GitHub-hosted macOS leg out of this
    # queue -- it runs on its own hosted VM, not the shared physical Mac.
    concurrency:
      group: ${{ (contains(matrix.os, 'self-hosted') && contains(matrix.os, 'macOS')) && format('cwr-arm64-self-hosted-macos-{0}', github.run_id) || format('cwr-arm64-{0}-{1}', github.run_id, matrix.name) }}
      cancel-in-progress: false

    # The self-hosted macOS leg is a supplementary, real-data-backed check --
    # its result doesn't gate the workflow. The GitHub-hosted macOS leg below
    # is the fast, always-available required signal for macOS.
    continue-on-error: ${{ matrix.optional == true }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # [external-data] tests under PoseidonTests read real localization
          # assets (equipment.utf8.html, STRINGTABLE_MAP.utf8.csv,
          # STRINGTABLE_EQUIPMENT.utf8.csv) from packages/Combined/, which is
          # gitignored and not distributed to the GitHub-hosted runners by
          # design. The self-hosted macOS runner has the real data staged
          # outside the checkout path (see "Stage Combined test data" below)
          # and runs these for real; Linux/Windows/hosted-macOS exclude them
          # by name, same as each other.
          - name: Linux RelWithDebInfo
            os: [self-hosted, debian-13, x64]
            preset: linux-x64-clang-rwdi
            vcpkg_triplet: x64-linux-clang
            build_dir: build/linux-x64-clang-rwdi
            build_target: ''
            ctest_exclude: 'PoseidonTests - (STRINGTABLE_MAP\.utf8\.csv ships both legend keys with English fallbacks|STRINGTABLE_EQUIPMENT\.utf8\.csv ships M16 keys for all 8 languages|equipment\.utf8\.html lives loose and references STR_EQ_M16 tokens|equipment\.utf8\.html line endings are clean CRLF \(no doubled CR\)|equipment\.utf8\.html preserves every EQ_ anchor and weapon image)'
          # Fast, always-available required check -- runs on GitHub's hosted
          # infrastructure so it never queues behind the single physical
          # self-hosted Mac. Same real-data exclusions as Linux; no ccache
          # (hosted runners are ephemeral, nothing to persist a cache dir on
          # between runs without extra setup) and no renderer smoke test
          # (hosted macOS VMs aren't guaranteed real GPU/Metal access).
          #
          # Also excludes 4 test_potime.cpp cases that assert tight sleep/
          # interval budgets (e.g. a 50ms sleep completing within 50ms) --
          # confirmed flaky specifically on this hosted VM class (observed
          # 89-143ms against 50-100ms budgets on a real run; SLEEP_MS macro
          # separately observed at 90ms against its 50ms budget), consistent
          # with GitHub's hosted macOS runners having looser scheduling
          # guarantees than the dedicated self-hosted Mac. Not excluded on
          # Linux/Windows/self-hosted, which don't show this jitter.
          - name: macOS (Apple Silicon) RelWithDebInfo
            os: macos-latest
            preset: macos-arm64-clang-rwdi
            vcpkg_triplet: arm64-osx
            build_dir: build/macos-arm64-clang-rwdi
            build_target: ''
            skip_smoke: true
            ctest_exclude: 'PoseidonTests - (STRINGTABLE_MAP\.utf8\.csv ships both legend keys with English fallbacks|STRINGTABLE_EQUIPMENT\.utf8\.csv ships M16 keys for all 8 languages|equipment\.utf8\.html lives loose and references STR_EQ_M16 tokens|equipment\.utf8\.html line endings are clean CRLF \(no doubled CR\)|equipment\.utf8\.html preserves every EQ_ anchor and weapon image)|PoseidonFoundationTests - potime - (Poseidon - Foundation - getSystemTime timing accuracy|Common usage patterns|Platform consistency|SLEEP_MS macro)'
          # Supplementary check against the real (non-excluded) Combined data
          # and a real GPU/Metal smoke test, on the single physical
          # self-hosted Mac -- optional (continue-on-error above) so it never
          # blocks on the shared-runner queue; treat a failure here as a real
          # signal worth investigating, just not a merge gate.
          - name: macOS (Apple Silicon, self-hosted, real data) RelWithDebInfo
            os: [self-hosted, macOS, arm64]
            preset: macos-arm64-clang-rwdi
            vcpkg_triplet: arm64-osx
            build_dir: build/macos-arm64-clang-rwdi
            build_target: ''
            optional: true
          - name: iOS Device Debug
            os: [self-hosted, macOS, arm64]
            preset: ios-arm64-device
            vcpkg_triplet: arm64-ios
            build_dir: build/ios-arm64-device
            build_target: PoseidonGame
            xcode: true
            skip_tests: true
          - name: Windows RelWithDebInfo
            os: windows-2022
            preset: win-x64-clang-rwdi
            vcpkg_triplet: x64-windows-clang
            build_dir: build/win-x64-clang-rwdi
            build_target: ''
            ctest_exclude: 'PoseidonTests - (OAL -|PAAEncoder -|Image - Save to \.paa|World state file format --|PreviewImage - saveToFile writes|PreviewImageRGB - saveToFile writes|STRINGTABLE_MAP\.utf8\.csv ships both legend keys with English fallbacks|STRINGTABLE_EQUIPMENT\.utf8\.csv ships M16 keys for all 8 languages|equipment\.utf8\.html lives loose and references STR_EQ_M16 tokens|equipment\.utf8\.html line endings are clean CRLF \(no doubled CR\)|equipment\.utf8\.html preserves every EQ_ anchor and weapon image)'

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # packages/ is gitignored and actions/checkout's clean:true wipes it
      # (git clean -ffdx removes ignored files too) at the start of every
      # run, so the real data lives outside the checkout at
      # /Users/jarvis/ci-data/Combined and gets relinked in here each time.
      # Self-hosted only -- that path doesn't exist on the hosted macOS
      # runner, which instead excludes the [external-data] tests by name
      # (matrix.ctest_exclude), same as Linux/Windows.
      - name: Stage Combined test data
        if: runner.os == 'macOS' && runner.environment == 'self-hosted'
        run: |
          mkdir -p packages
          ln -sfn /Users/jarvis/ci-data/Combined packages/Combined

      - name: Install macOS dependencies
        if: runner.os == 'macOS' && runner.environment != 'self-hosted'
        run: brew install ccache clang-format

      - name: Install Linux system packages
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            autoconf-archive \
            automake \
            ca-certificates \
            clang \
            clang-format \
            curl \
            libtool \
            make \
            perl \
            pkg-config \
            tar \
            zip \
            libgl1-mesa-dev \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libxtst-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libopenal-dev \
            wayland-protocols \
            ccache \
            unzip

      - name: Verify macOS dependencies
        if: runner.os == 'macOS'
        run: |
          command -v brew
          command -v cmake
          command -v ninja
          command -v ccache
          command -v clang
          command -v clang++
          command -v clang-format
          command -v pkg-config
          command -v xcodebuild

      - name: Setup MSVC developer environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup LLVM and Clang
        if: runner.os == 'Windows'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: '19'
          arch: 'x64'
          directory: 'C:\Program Files\LLVM'

      # Windows is hosted/ephemeral, so unlike the self-hosted runners below
      # there's no local disk to persist a ccache dir on between runs --
      # this wraps ccache's directory in actions/cache instead (restore
      # before the build, save after). Experimental: this repo used to run
      # this same action unconditionally on all hosted runners and dropped
      # it in 43d1d43 without a documented reason; trying it on Windows
      # alone first before considering hosted macOS too.
      - name: Setup compiler cache (Windows)
        if: runner.os == 'Windows'
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          variant: ccache
          key: ${{ matrix.preset }}
          max-size: 300M

      - name: Configure self-hosted compiler cache
        if: runner.environment == 'self-hosted' && runner.os != 'Windows'
        run: |
          export CCACHE_DIR="$HOME/.cache/ccache/${{ matrix.preset }}"
          mkdir -p "$CCACHE_DIR"
          if [ "${{ runner.os }}" = "macOS" ]; then
            current_clang="$(xcrun clang --version | head -n 1)"
            clang_stamp="$CCACHE_DIR/.xcode-clang-version"
            echo "CCACHE_COMPILERCHECK=string:$current_clang" >> "$GITHUB_ENV"
            if [ ! -f "$clang_stamp" ] || [ "$(cat "$clang_stamp")" != "$current_clang" ]; then
              echo "Xcode/clang changed; clearing ccache for ${{ matrix.preset }}"
              ccache --clear
              printf '%s\n' "$current_clang" > "$clang_stamp"
            fi
          fi
          ccache --set-config=max_size=1G
          ccache --zero-stats
          echo "CCACHE_DIR=$CCACHE_DIR" >> "$GITHUB_ENV"

      - name: Setup CMake and Ninja
        if: runner.os != 'macOS'
        uses: lukka/get-cmake@latest

      - name: Show toolchain versions
        if: runner.os != 'Windows'
        run: |
          cmake --version
          ninja --version
          ccache --version
          clang --version
          clang++ --version
          if [ "${{ runner.os }}" = "Linux" ]; then
            pkg-config --modversion openal
            /sbin/ldconfig -p | grep -E 'libopenal\.so(\.1)?'
          fi

      - name: Clear macOS precompiled headers
        if: runner.environment == 'self-hosted' && runner.os == 'macOS'
        run: |
          xcrun clang --version | head -n 1
          build_dirs=(
            "${{ matrix.build_dir }}"
            "build/macos-arm64-clang-rwdi"
            "build/ios-arm64-device"
          )

          for build_dir in "${build_dirs[@]}"; do
            echo "Clearing CMake precompiled headers in $build_dir"
            find "$build_dir" -name '*.pch' -delete 2>/dev/null || true
          done

      - name: Show Windows toolchain versions
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake --version
          ninja --version
          clang-cl --version
          Get-Command link.exe

      - name: Configure self-hosted vcpkg binary cache
        if: runner.environment == 'self-hosted'
        run: |
          mkdir -p "$HOME/.cache/vcpkg-bincache/${{ matrix.vcpkg_triplet }}"
          mkdir -p .vcpkg-bincache
          rm -rf ".vcpkg-bincache/${{ matrix.vcpkg_triplet }}"
          ln -s "$HOME/.cache/vcpkg-bincache/${{ matrix.vcpkg_triplet }}" ".vcpkg-bincache/${{ matrix.vcpkg_triplet }}"

      # vcpkg's binary cache fingerprints each package by an ABI hash that
      # bakes in the compiler/toolchain version. Windows pins its LLVM
      # version explicitly (KyleMayes/install-llvm-action above) so it can't
      # drift, but hosted macOS's Xcode/clang comes from whatever the
      # macos-latest image currently ships, which GitHub updates over time.
      # Without the toolchain version in the cache key, a cache built under
      # an older Xcode would keep matching this key forever while every
      # package's ABI hash silently mismatches -- "cache hit" downloads a
      # blob vcpkg then rejects and rebuilds from source anyway (observed:
      # a 156MB "hit" followed by 27 packages rebuilt, incl. a 2min openssl
      # build). Folding the toolchain version into the key means a version
      # change naturally busts the cache instead of poisoning it forever.
      - name: Get macOS toolchain version
        id: macos_toolchain
        if: runner.os == 'macOS'
        run: echo "version=$(xcrun clang --version | head -n 1)" >> "$GITHUB_OUTPUT"

      - name: Restore vcpkg binary cache
        if: runner.environment != 'self-hosted'
        uses: actions/cache@v6
        with:
          path: .vcpkg-bincache/${{ matrix.vcpkg_triplet }}
          key: vcpkg-${{ runner.os }}-${{ matrix.vcpkg_triplet }}-${{ steps.macos_toolchain.outputs.version }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'cmake/vcpkg-triplets/**', 'cmake/vcpkg-overlay-ports/**') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ matrix.vcpkg_triplet }}-${{ steps.macos_toolchain.outputs.version }}-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        env:
          VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/.vcpkg-bincache/${{ matrix.vcpkg_triplet }},readwrite
          VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-bincache/${{ matrix.vcpkg_triplet }}
          VCPKG_DEFAULT_TRIPLET: ${{ matrix.vcpkg_triplet }}
          VCPKG_INSTALLED_DIR: ${{ github.workspace }}/${{ matrix.build_dir }}/vcpkg_installed
          VCPKG_OVERLAY_PORTS: ${{ github.workspace }}/cmake/vcpkg-overlay-ports
          VCPKG_OVERLAY_TRIPLETS: ${{ github.workspace }}/cmake/vcpkg-triplets
        with:
          vcpkgDirectory: ${{ runner.tool_cache }}/vcpkg
          vcpkgGitCommitId: 15cd15b0da3c48a0c7720e4c87e0b6030334feed
          runVcpkgInstall: true
          vcpkgJsonGlob: 'vcpkg.json'

      - name: Configure
        if: matrix.xcode != true && runner.environment == 'self-hosted'
        run: >
          cmake
          --preset ${{ matrix.preset }}
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Configure
        if: matrix.xcode != true && runner.environment != 'self-hosted' && runner.os != 'Windows'
        run: >
          cmake
          --preset ${{ matrix.preset }}
          -DCMAKE_C_COMPILER_LAUNCHER=
          -DCMAKE_CXX_COMPILER_LAUNCHER=

      - name: Configure
        if: matrix.xcode != true && runner.os == 'Windows'
        run: >
          cmake
          --preset ${{ matrix.preset }}
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Configure Xcode
        if: matrix.xcode == true
        run: >
          cmake
          --preset ${{ matrix.preset }}
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        if: matrix.build_target == ''
        run: cmake --build ${{ matrix.build_dir }}

      - name: Build target
        if: matrix.build_target != '' && matrix.xcode != true
        run: cmake --build ${{ matrix.build_dir }} --target ${{ matrix.build_target }}

      - name: Build Xcode target
        if: matrix.build_target != '' && matrix.xcode == true
        run: >
          cmake --build ${{ matrix.build_dir }}
          --target ${{ matrix.build_target }}
          --
          -quiet
          CODE_SIGNING_ALLOWED=NO
          CODE_SIGNING_REQUIRED=NO

      - name: Test
        if: runner.os != 'Windows' && matrix.skip_tests != true
        env:
          CTEST_EXCLUDE: ${{ matrix.ctest_exclude }}
          ALSOFT_DRIVERS: ${{ runner.os == 'Linux' && 'null' || '' }}
        run: |
          if [ -z "${CTEST_EXCLUDE}" ]; then
            ctest --test-dir '${{ matrix.build_dir }}' --output-on-failure --timeout 600
          else
            ctest --test-dir '${{ matrix.build_dir }}' --output-on-failure --timeout 600 -E "${CTEST_EXCLUDE}"
          fi

      - name: Test
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          CTEST_EXCLUDE: ${{ matrix.ctest_exclude }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CTEST_EXCLUDE)) {
            ctest --test-dir '${{ matrix.build_dir }}' --output-on-failure --timeout 600
          } else {
            ctest --test-dir '${{ matrix.build_dir }}' --output-on-failure --timeout 600 -E "$env:CTEST_EXCLUDE"
          }

      - name: Show compiler cache stats
        if: always() && (runner.environment == 'self-hosted' || runner.os == 'Windows')
        run: ccache --show-stats

      - name: Smoke test macOS renderers
        if: runner.os == 'macOS' && matrix.skip_tests != true && matrix.skip_smoke != true
        run: |
          '${{ matrix.build_dir }}/apps/tools/GL33SmokeTest/GL33SmokeTest' --check
          '${{ matrix.build_dir }}/apps/tools/MetalSmokeTest/MetalSmokeTest' --check

      - name: Upload CTest logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          # matrix.name, not matrix.preset -- the hosted and self-hosted macOS
          # legs share the same preset/build_dir (different runners entirely,
          # no collision there) but actions/upload-artifact@v4 rejects two
          # uploads with the same name within one workflow run, so the
          # artifact name needs the thing that's actually unique per entry.
          name: ctest-logs-${{ matrix.name }}
          path: ${{ matrix.build_dir }}/Testing/
          if-no-files-found: ignore
