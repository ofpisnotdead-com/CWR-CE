name: C++ / Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CCACHE_BASEDIR: ${{ github.workspace }}
  CCACHE_SLOPPINESS: pch_defines,time_macros,include_file_mtime,include_file_ctime
  CCACHE_NOHASHDIR: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux RelWithDebInfo
            os: ubuntu-24.04
            preset: linux-x64-clang-rwdi
            vcpkg_triplet: x64-linux-clang
            build_dir: build/linux-x64-clang-rwdi
            ctest_exclude: 'PoseidonTests - OAL -'
            binaries_upload: 'Linux-x64-rwdi'
          - name: macOS arm64 RelWithDebInfo
            os: macos-26
            preset: darwin-arm64-clang-rwdi
            vcpkg_triplet: arm64-darwin-clang
            build_dir: build/darwin-arm64-clang-rwdi
            ctest_exclude: 'PoseidonTests - OAL -'
            binaries_upload: 'macOS-arm64-rwdi'
          - name: macOS x64 RelWithDebInfo
            os: macos-26-intel
            preset: darwin-x64-clang-rwdi
            vcpkg_triplet: x64-darwin-clang
            build_dir: build/darwin-x64-clang-rwdi
            ctest_exclude: 'PoseidonTests - OAL -'
            binaries_upload: 'macOS-x64-rwdi'
          - name: Windows RelWithDebInfo
            os: windows-2022
            preset: win-x64-clang-rwdi
            vcpkg_triplet: x64-windows-clang
            build_dir: build/win-x64-clang-rwdi
            ctest_exclude: 'PoseidonTests - (OAL -|PAAEncoder -|Image - Save to \.paa|World state file format --|PreviewImage - saveToFile writes|PreviewImageRGB - saveToFile writes)'
            binaries_upload: 'Windows-x64-rwdi'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system packages
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            autoconf-archive \
            automake \
            clang \
            libtool \
            libltdl-dev \
            pkg-config \
            libgl1-mesa-dev \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libxtst-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libwayland-dev \
            wayland-protocols

      - name: Install macOS homebrew packages
        if: runner.os == 'macOS'
        run: |
          brew install \
            clang-format

      - name: Setup LLVM and Clang
        if: runner.os == 'Windows'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: '19'
          arch: 'x64'
          directory: 'C:\Program Files\LLVM'

      - name: Setup compiler cache
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          variant: ccache
          key: ${{ runner.os }}-${{ matrix.preset }}-pch-${{ hashFiles('engine/Poseidon/Foundation/PoseidonPCH.hpp', 'engine/Poseidon/Foundation/platform.hpp') }}
          max-size: 1G

      - name: Setup CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Restore vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: .vcpkg-bincache/${{ matrix.vcpkg_triplet }}
          key: vcpkg-${{ runner.os }}-${{ matrix.vcpkg_triplet }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'cmake/vcpkg-triplets/**', 'cmake/vcpkg-overlay-ports/**') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ matrix.vcpkg_triplet }}-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        env:
          VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/.vcpkg-bincache/${{ matrix.vcpkg_triplet }},readwrite
          VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-bincache/${{ matrix.vcpkg_triplet }}
          VCPKG_DEFAULT_TRIPLET: ${{ matrix.vcpkg_triplet }}
          VCPKG_INSTALLED_DIR: ${{ github.workspace }}/${{ matrix.build_dir }}/vcpkg_installed
          VCPKG_OVERLAY_PORTS: ${{ github.workspace }}/cmake/vcpkg-overlay-ports
          VCPKG_OVERLAY_TRIPLETS: ${{ github.workspace }}/cmake/vcpkg-triplets
        with:
          runVcpkgInstall: true
          vcpkgJsonGlob: 'vcpkg.json'

      - name: Configure
        run: >
          cmake
          --preset ${{ matrix.preset }}
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build ${{ matrix.build_dir }} --parallel 2

      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.binaries_upload }}
          path: |
            ${{ matrix.build_dir }}/apps/cwr/Game/PoseidonGame
            ${{ matrix.build_dir }}/apps/cwr/Game/PoseidonGame.exe
            ${{ matrix.build_dir }}/apps/cwr/GameDemo/PoseidonGameDemo
            ${{ matrix.build_dir }}/apps/cwr/GameDemo/PoseidonGameDemo.exe
            ${{ matrix.build_dir }}/apps/cwr/Server/PoseidonServer
            ${{ matrix.build_dir }}/apps/cwr/Server/PoseidonServer.exe

      - name: Test
        shell: pwsh
        env:
          CTEST_EXCLUDE: ${{ matrix.ctest_exclude }}
        run: ctest --test-dir '${{ matrix.build_dir }}' --output-on-failure -E "$env:CTEST_EXCLUDE"

  steamrt4:
    name: SteamRT4 Release
    runs-on: ubuntu-24.04
    env:
      STEAMRT4_PRESET: linux-x64-steamrt4
      STEAMRT4_VCPKG_TRIPLET: x64-linux-clang
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build SteamRT4 SDK image
        uses: docker/build-push-action@v6
        with:
          context: docker/steamrt4
          load: true
          tags: cwr-steamrt4:latest
          cache-from: type=gha,scope=steamrt4-sdk
          cache-to: type=gha,mode=max,scope=steamrt4-sdk

      - name: Restore SteamRT4 compiler cache
        uses: actions/cache@v4
        with:
          path: tmp/steamrt4-ccache
          key: ccache-SteamRT4-${{ env.STEAMRT4_PRESET }}-${{ github.sha }}
          restore-keys: |
            ccache-SteamRT4-${{ env.STEAMRT4_PRESET }}-

      - name: Restore SteamRT4 vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: .vcpkg-bincache/${{ env.STEAMRT4_VCPKG_TRIPLET }}
          key: vcpkg-SteamRT4-${{ env.STEAMRT4_VCPKG_TRIPLET }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'cmake/vcpkg-triplets/**', 'cmake/vcpkg-overlay-ports/**') }}
          restore-keys: |
            vcpkg-SteamRT4-${{ env.STEAMRT4_VCPKG_TRIPLET }}-

      - name: Build inside SteamRT4 container
        run: |
          set -o pipefail
          mkdir -p \
            "${{ github.workspace }}/tmp/steamrt4-ccache" \
            "${{ github.workspace }}/.vcpkg-bincache/${{ env.STEAMRT4_VCPKG_TRIPLET }}"
          docker run --rm \
            -e OFPR_TARGETS=all \
            -e VCPKG_BINARY_SOURCES="clear;files,/work/ofpr/.vcpkg-bincache/${{ env.STEAMRT4_VCPKG_TRIPLET }},readwrite" \
            -e VCPKG_DEFAULT_BINARY_CACHE="/work/ofpr/.vcpkg-bincache/${{ env.STEAMRT4_VCPKG_TRIPLET }}" \
            -e VCPKG_DEFAULT_TRIPLET="${{ env.STEAMRT4_VCPKG_TRIPLET }}" \
            -v "${{ github.workspace }}:/work/ofpr" \
            cwr-steamrt4:latest 2>&1 | tee steamrt4-build.log

      - name: Upload SteamRT4 build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: steamrt4-build-log
          path: steamrt4-build.log
