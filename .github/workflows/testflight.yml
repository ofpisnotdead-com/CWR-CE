name: TestFlight

# Required GitHub Secrets (PROD environment) -- same shape as
# McArdle-Systems/Chanology's testflight.yml, adapted for this repo's own
# app/team (the certificate and API key MAY be reused across apps under the
# same Apple Developer Team, but the provisioning profile is bundle-ID
# specific and must be created fresh for io.mcardle.cwr, named exactly
# "Github Actions profile (CWR)" to match fastlane/Fastfile -- Apple
# requires provisioning profile names to be unique account-wide, so it can't
# reuse Chanology's exact "Github Actions profile" name):
#   BUILD_CERTIFICATE_BASE64         — Apple Distribution cert as base64 P12
#   P12_PASSWORD                     — P12 export password
#   BUILD_PROVISION_PROFILE_BASE64   — App Store provisioning profile as base64
#   KEYCHAIN_PASSWORD                — any string, used for the temp CI keychain
#   DEVELOPMENT_TEAM                 — 10-char Apple Team ID
#   APP_STORE_CONNECT_KEY_ID         — App Store Connect API key ID
#   APP_STORE_CONNECT_ISSUER_ID      — App Store Connect API key issuer UUID
#   APP_STORE_CONNECT_API_KEY_BASE64 — .p8 API key file as base64

on:
  workflow_run:
    workflows: ["Build"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: testflight-main
  cancel-in-progress: true

env:
  CCACHE_BASEDIR: ${{ github.workspace }}
  CCACHE_SLOPPINESS: pch_defines,time_macros,include_file_mtime,include_file_ctime
  CCACHE_NOHASHDIR: true

jobs:
  deploy:
    runs-on: [self-hosted, macOS, arm64]
    environment: PROD
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: Configure self-hosted compiler cache
        run: |
          CCACHE_DIR="$HOME/.cache/ccache/ios-arm64-device-appstore"
          mkdir -p "$CCACHE_DIR"
          current_clang="$(xcrun clang --version | head -n 1)"
          clang_stamp="$CCACHE_DIR/.xcode-clang-version"
          echo "CCACHE_COMPILERCHECK=string:$current_clang" >> "$GITHUB_ENV"
          if [ ! -f "$clang_stamp" ] || [ "$(cat "$clang_stamp")" != "$current_clang" ]; then
            echo "Xcode/clang changed; clearing ccache for ios-arm64-device-appstore"
            ccache --clear
            printf '%s\n' "$current_clang" > "$clang_stamp"
          fi
          ccache --set-config=max_size=1G
          ccache --zero-stats
          echo "CCACHE_DIR=$CCACHE_DIR" >> "$GITHUB_ENV"

      - name: Configure self-hosted vcpkg binary cache
        run: |
          mkdir -p "$HOME/.cache/vcpkg-bincache/arm64-ios"
          mkdir -p .vcpkg-bincache
          rm -rf ".vcpkg-bincache/arm64-ios"
          ln -s "$HOME/.cache/vcpkg-bincache/arm64-ios" ".vcpkg-bincache/arm64-ios"

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        env:
          VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/.vcpkg-bincache/arm64-ios,readwrite
          VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-bincache/arm64-ios
          VCPKG_DEFAULT_TRIPLET: arm64-ios
          VCPKG_INSTALLED_DIR: ${{ github.workspace }}/build/ios-arm64-device-appstore/vcpkg_installed
          VCPKG_OVERLAY_PORTS: ${{ github.workspace }}/cmake/vcpkg-overlay-ports
          VCPKG_OVERLAY_TRIPLETS: ${{ github.workspace }}/cmake/vcpkg-triplets
        with:
          vcpkgDirectory: ${{ runner.tool_cache }}/vcpkg
          vcpkgGitCommitId: 15cd15b0da3c48a0c7720e4c87e0b6030334feed
          runVcpkgInstall: true
          vcpkgJsonGlob: 'vcpkg.json'

      - name: Import distribution certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" ~/Library/Keychains/login.keychain-db /Library/Keychains/System.keychain

      - name: Install provisioning profile
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"
          UUID=$(security cms -D -i "$PP_PATH" | plutil -extract UUID raw -)
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID".mobileprovision

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build and upload to TestFlight
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          OTHER_CODE_SIGN_FLAGS: "--keychain ${{ runner.temp }}/app-signing.keychain-db"
        run: /opt/homebrew/bin/fastlane beta

      - name: Show compiler cache stats
        if: always()
        run: ccache --show-stats

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true
          rm -f "$RUNNER_TEMP/build_certificate.p12" "$RUNNER_TEMP/build_pp.mobileprovision"
