name: C++ / Trident

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CCACHE_BASEDIR: ${{ github.workspace }}
  CCACHE_SLOPPINESS: pch_defines,time_macros,include_file_mtime,include_file_ctime
  CCACHE_NOHASHDIR: true
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  STEAM_APP_ID: '4819000'
  TRIDENT_TEST_PATH: tests/integration

jobs:
  smoke:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    env:
      STEAM_SHARED_SECRET: ${{ secrets.STEAM_SHARED_SECRET }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-24.04
            preset: linux-x64-clang-rwdi
            vcpkg_triplet: x64-linux-clang
            build_dir: build/linux-x64-clang-rwdi
            dist_dir: dist/x64-linux-rwdi
          - name: Windows
            os: windows-2022
            preset: win-x64-clang-rwdi
            vcpkg_triplet: x64-windows-clang
            build_dir: build/win-x64-clang-rwdi
            dist_dir: dist/x64-win-rwdi

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SteamCMD
        uses: andriivitiv/setup-steamcmd@v1

      - name: Generate Steam auth code
        id: steam_totp
        if: env.STEAM_SHARED_SECRET != ''
        uses: andriivitiv/steam-totp@v1
        env:
          STEAM_SHARED_SECRET: ${{ secrets.STEAM_SHARED_SECRET }}
        with:
          shared_secret: ${{ secrets.STEAM_SHARED_SECRET }}

      - name: Try Steam demo game data
        shell: pwsh
        env:
          GAME_DATA_DIR: ${{ github.workspace }}/.game-data/remaster-demo
          STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
          STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}
          STEAM_TOTP_CODE: ${{ steps.steam_totp.outputs.code }}
        run: |
          $ErrorActionPreference = 'Stop'
          $requiredFiles = @(
            'BIN/RESOURCE.BIN',
            'BIN/STRINGTABLE_MAINMENU.utf8.csv',
            'BIN/optionsShell.hpp',
            'DTA/Data.pbo',
            'DTA/Fonts.pbo',
            'fonts/cwr_title.ttf',
            'Missions/Demo.Demo/mission.sqm'
          )

          function Test-DemoContent {
            param([string] $Path)

            $ok = $true
            foreach ($required in $requiredFiles) {
              $requiredPath = Join-Path $Path $required
              $exists = Test-Path -LiteralPath $requiredPath
              Write-Host "Steam required content $required = $exists"
              if (-not $exists) {
                $ok = $false
              }
            }
            return $ok
          }

          $hasSteamCredentials = -not [string]::IsNullOrWhiteSpace($env:STEAM_USERNAME) -and -not [string]::IsNullOrWhiteSpace($env:STEAM_PASSWORD)
          Write-Host "Steam authenticated login configured: $hasSteamCredentials"

          foreach ($platform in @('', 'windows', 'linux')) {
            $label = if ($platform) { $platform } else { 'native' }
            $attemptDir = Join-Path $env:GAME_DATA_DIR $label
            Remove-Item -LiteralPath $attemptDir -Recurse -Force -ErrorAction SilentlyContinue
            New-Item -ItemType Directory -Force -Path $attemptDir

            $loginArgs = if ($hasSteamCredentials) {
              if ([string]::IsNullOrWhiteSpace($env:STEAM_TOTP_CODE)) {
                @('+login', $env:STEAM_USERNAME, $env:STEAM_PASSWORD)
              } else {
                @('+login', $env:STEAM_USERNAME, $env:STEAM_PASSWORD, $env:STEAM_TOTP_CODE)
              }
            } else {
              @('+login', 'anonymous')
            }

            $steamArgs = @('+force_install_dir', $attemptDir) + $loginArgs + @('+app_license_request', $env:STEAM_APP_ID, '+app_update', $env:STEAM_APP_ID, 'validate', '+quit')
            if ($platform) {
              $steamArgs = @('+@sSteamCmdForcePlatformType', $platform) + $steamArgs
            }

            Write-Host "Trying Steam demo content platform: $label"
            & steamcmd @steamArgs
            $steamExit = $LASTEXITCODE
            if ($steamExit -ne 0) {
              Write-Warning "SteamCMD app_update failed for platform $label with exit code $steamExit"
            }

            $files = @(Get-ChildItem -LiteralPath $attemptDir -Recurse -File -ErrorAction SilentlyContinue)
            $totalBytes = ($files | Measure-Object -Property Length -Sum).Sum
            Write-Host "Steam content directory: $attemptDir"
            Write-Host "Steam content file count: $($files.Count)"
            Write-Host "Steam content total bytes: $totalBytes"
            $root = (Resolve-Path -LiteralPath $attemptDir).Path
            $files |
              Sort-Object FullName |
              Select-Object -First 120 |
              ForEach-Object {
                $relative = $_.FullName.Substring($root.Length).TrimStart([IO.Path]::DirectorySeparatorChar, [IO.Path]::AltDirectorySeparatorChar)
                Write-Host ("Steam file {0} ({1} bytes)" -f $relative, $_.Length)
              }

            if ((Test-DemoContent -Path $attemptDir) -and $steamExit -eq 0) {
              Get-ChildItem -LiteralPath $attemptDir -Recurse -Include *.exe,*.dll,*.pdb -File | Remove-Item -Force
              "TRIDENT_DATA_DIR=$attemptDir" | Add-Content -LiteralPath $env:GITHUB_ENV
              Write-Host "Using Trident data directory: $attemptDir"
              exit 0
            }
          }

          throw "Steam demo content was not available from native, windows, or linux SteamCMD installs."

      - name: Install Linux system packages
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            autoconf-archive \
            automake \
            clang \
            libtool \
            pkg-config \
            libgl1-mesa-dev \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libxtst-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libwayland-dev \
            wayland-protocols \
            xvfb \
            xauth

      - name: Setup LLVM and Clang
        if: runner.os == 'Windows'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: '19'
          arch: 'x64'
          directory: 'C:\Program Files\LLVM'

      - name: Setup compiler cache
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          variant: ccache
          key: ${{ runner.os }}-${{ matrix.preset }}-pch
          max-size: 1G

      - name: Setup CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Restore vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: .vcpkg-bincache/${{ matrix.vcpkg_triplet }}
          key: vcpkg-${{ runner.os }}-${{ matrix.vcpkg_triplet }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'cmake/vcpkg-triplets/**', 'cmake/vcpkg-overlay-ports/**') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ matrix.vcpkg_triplet }}-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        env:
          VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/.vcpkg-bincache/${{ matrix.vcpkg_triplet }},readwrite
          VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-bincache/${{ matrix.vcpkg_triplet }}
          VCPKG_DEFAULT_TRIPLET: ${{ matrix.vcpkg_triplet }}
          VCPKG_INSTALLED_DIR: ${{ github.workspace }}/${{ matrix.build_dir }}/vcpkg_installed
          VCPKG_OVERLAY_PORTS: ${{ github.workspace }}/cmake/vcpkg-overlay-ports
          VCPKG_OVERLAY_TRIPLETS: ${{ github.workspace }}/cmake/vcpkg-triplets
        with:
          runVcpkgInstall: true
          vcpkgJsonGlob: 'vcpkg.json'

      - name: Configure C++
        run: >
          cmake
          --preset ${{ matrix.preset }}
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build C++ game
        run: cmake --build ${{ matrix.build_dir }} --target PoseidonGame --parallel 2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            engine/Trident -> target

      - name: Build Trident
        working-directory: engine/Trident
        run: cargo build --locked --profile rwdi

      - name: Write Trident env
        shell: pwsh
        env:
          OFPR_GAME_DIR: ${{ github.workspace }}/${{ matrix.dist_dir }}
          TRI_OUTPUT_DIR: ${{ github.workspace }}/trident-output
        run: |
          $ErrorActionPreference = 'Stop'
          @(
            "OFPR_GAME_DIR=$env:OFPR_GAME_DIR"
            "OFPR_DATA_DIR=$env:TRIDENT_DATA_DIR"
            "TRI_OUTPUT_DIR=$env:TRI_OUTPUT_DIR"
          ) | Set-Content -LiteralPath .trident.env -Encoding utf8
          Get-Content -LiteralPath .trident.env

      - name: Check game startup
        shell: pwsh
        env:
          OFPR_GAME_DIR: ${{ github.workspace }}/${{ matrix.dist_dir }}
        run: |
          $ErrorActionPreference = 'Stop'
          $exeName = if ($env:RUNNER_OS -eq 'Windows') { 'PoseidonGame.exe' } else { 'PoseidonGame' }
          $gameExe = Join-Path $env:OFPR_GAME_DIR $exeName
          $stdoutLog = Join-Path $env:RUNNER_TEMP 'game-startup.stdout.log'
          $stderrLog = Join-Path $env:RUNNER_TEMP 'game-startup.stderr.log'
          $gameArgs = @('-C', $env:TRIDENT_DATA_DIR, '--window', '--check', '--log-format', 'jsonl', '--render', 'dummy', '--nosound', '--no-strict')
          Get-ChildItem -LiteralPath $env:OFPR_GAME_DIR -Force | Format-Table -AutoSize Name,Length,LastWriteTime
          $process = Start-Process -FilePath $gameExe -ArgumentList $gameArgs -NoNewWindow -Wait -PassThru -RedirectStandardOutput $stdoutLog -RedirectStandardError $stderrLog
          $exitCode = $process.ExitCode
          Write-Host "Game startup exit code: $exitCode"
          foreach ($log in @($stdoutLog, $stderrLog)) {
            if (Test-Path -LiteralPath $log) {
              Write-Host "::group::$log"
              Get-Content -LiteralPath $log -ErrorAction Continue
              Write-Host '::endgroup::'
            }
          }
          if ($exitCode -ne 0) {
            Get-ChildItem -Path $env:GITHUB_WORKSPACE,$env:RUNNER_TEMP -Recurse -Filter *.dmp -ErrorAction SilentlyContinue |
              Format-Table -AutoSize FullName,Length,LastWriteTime
            throw "Game startup check failed with exit code $exitCode"
          }

      - name: Run Trident smoke test
        shell: pwsh
        env:
          OFPR_GAME_DIR: ${{ github.workspace }}/${{ matrix.dist_dir }}
          TRI_OUTPUT_DIR: ${{ github.workspace }}/trident-output
          RUST_LOG: debug
        run: |
          $ErrorActionPreference = 'Stop'
          $commonArgs = @(
            'test',
            '--game-dir', $env:OFPR_GAME_DIR,
            '--data-dir', $env:TRIDENT_DATA_DIR,
            '--output-dir', $env:TRI_OUTPUT_DIR,
            '--render', 'dummy',
            '--retries', '0',
            '--game-arg', '--nosound',
            '--game-arg', '--no-strict',
            $env:TRIDENT_TEST_PATH
          )
          if ($env:RUNNER_OS -eq 'Linux') {
            xvfb-run -a engine/Trident/target/rwdi/tri @commonArgs
          } else {
            & engine/Trident/target/rwdi/tri.exe @commonArgs
          }

      - name: Dump Trident output
        if: failure()
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not (Test-Path -LiteralPath trident-output)) {
            Write-Host 'No trident-output directory was created.'
            exit 0
          }

          Get-ChildItem -LiteralPath trident-output -Recurse -Force | Format-Table -AutoSize FullName,Length,LastWriteTime
          Get-ChildItem -LiteralPath trident-output -Recurse -File -Force | ForEach-Object {
            Write-Host "::group::$($_.FullName)"
            Get-Content -LiteralPath $_.FullName -Tail 200 -ErrorAction Continue
            Write-Host '::endgroup::'
          }

      - name: Upload Trident output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trident-output-${{ matrix.os }}
          path: trident-output
          if-no-files-found: ignore
