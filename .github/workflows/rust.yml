name: Rust

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build-test:
    name: ${{ matrix.name }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Trident
            os: ubuntu-24.04
            project: engine/Trident
          - name: Trident
            os: windows-2022
            project: engine/Trident
          - name: PapaBear Archive
            os: ubuntu-24.04
            project: mserver/Archive
          - name: PapaBear Archive
            os: windows-2022
            project: mserver/Archive
          - name: PapaBear Client
            os: ubuntu-24.04
            project: mserver/Client
          - name: PapaBear Client
            os: windows-2022
            project: mserver/Client
          - name: PapaBear CLI
            os: ubuntu-24.04
            project: mserver/CLI
          - name: PapaBear CLI
            os: windows-2022
            project: mserver/CLI
          - name: PapaBear MasterService
            os: ubuntu-24.04
            project: mserver/MasterService
          - name: PapaBear MasterService
            os: windows-2022
            project: mserver/MasterService

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ${{ matrix.project }} -> target

      - name: Check formatting
        working-directory: ${{ matrix.project }}
        run: cargo fmt -- --check

      - name: Check clippy
        working-directory: ${{ matrix.project }}
        run: cargo clippy --locked --all-targets

      - name: Build
        working-directory: ${{ matrix.project }}
        run: cargo build --locked

      - name: Test
        working-directory: ${{ matrix.project }}
        run: cargo test --locked
